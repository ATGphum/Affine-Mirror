<style>
  html, body { margin: 0; padding: 0; background: #1c1c1c; height: 100%; overflow: hidden; }
  ::selection { background: rgba(214,184,90,0.30); color: #F5F2EA; }
  @keyframes markIn { from { opacity: 0; transform: scale(0.965); } to { opacity: 1; transform: scale(1); } }
  @keyframes spinY { 0%, 100% { transform: rotateY(42deg); } 50% { transform: rotateY(-42deg); } }
  @keyframes spinX { 0%, 100% { transform: rotateX(-46deg); } 50% { transform: rotateX(46deg); } }
  @keyframes spinZ { to { transform: rotateZ(360deg); } }
  .rotY, .rotX, .rotZ { position: absolute; inset: 0; transform-style: preserve-3d; transform-origin: center; }
  .rotY { animation: spinY 28s ease-in-out infinite; }
  .rotX { animation: spinX 20s ease-in-out infinite; }
  .rotZ { animation: spinZ 46s linear infinite; }
  @keyframes align1 { 0%, 100% { transform: rotateX(38deg) rotateY(22deg) rotateZ(10deg) translateZ(-28px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(-30px); } }
  @keyframes align2 { 0%, 100% { transform: rotateX(-30deg) rotateY(44deg) rotateZ(-22deg) translateZ(-16px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(-18px); } }
  @keyframes align3 { 0%, 100% { transform: rotateX(20deg) rotateY(-36deg) rotateZ(30deg) translateZ(-6px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(-6px); } }
  @keyframes align4 { 0%, 100% { transform: rotateX(-46deg) rotateY(-14deg) rotateZ(-14deg) translateZ(8px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(8px); } }
  @keyframes align5 { 0%, 100% { transform: rotateX(28deg) rotateY(32deg) rotateZ(-28deg) translateZ(20px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(20px); } }
  @keyframes align6 { 0%, 100% { transform: rotateX(-22deg) rotateY(-48deg) rotateZ(18deg) translateZ(32px); } 50% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(32px); } }
  @media (prefers-reduced-motion: reduce) { .rotY, .rotX, .rotZ { animation: none !important; } .depth.gz { display: none; } }

  /* ===== Mobile responsive (<=760px). Desktop rendering unchanged. ===== */
  @media (max-width: 760px) {
    /* A. Horizontal-overflow guard. Keep hero non-scrolling but never overflow sideways. */
    html, body { overflow-x: hidden !important; max-width: 100vw !important; }
    *, *::before, *::after { box-sizing: border-box; }

    /* Outer hero wrapper: stay full-viewport, no horizontal bleed. */
    body > div[style*="height:100vh"],
    body > div[style*="height: 100vh"] {
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }

    /* D. Fixed top NAV (grid-template-columns: 1fr auto 1fr): tighten padding so links fit. */
    header[style*="grid-template-columns: 1fr auto 1fr"] {
      padding: 16px 14px !important;
    }
    /* Nav links container: shrink gap, allow wrap, center, keep within width. */
    header[style*="grid-template-columns: 1fr auto 1fr"] nav {
      gap: 14px !important;
      flex-wrap: wrap !important;
      justify-content: center !important;
      max-width: 100% !important;
    }
    /* Shrink link type + letter-spacing so the four labels fit a 375px row. */
    header[style*="grid-template-columns: 1fr auto 1fr"] nav a {
      font-size: 10px !important;
      letter-spacing: 0.04em !important;
    }

    /* E. Reduce generous section padding; keep clearance below the fixed nav. */
    section[style*="min-height:100vh"],
    section[style*="min-height: 100vh"] {
      padding: 96px 18px 32px !important;
    }

    /* The hero mark: cap size so it fits inside a 375x667 viewport. */
    .mark-wrap {
      width: min(78vw, 60vh) !important;
      max-width: 100% !important;
    }

    /* G. Images/media never exceed their box. */
    img { max-width: 100%; height: auto; }
    .depth.gz { max-width: 100%; }
  }

  /* Finer tuning for the smallest phones. */
  @media (max-width: 460px) {
    header[style*="grid-template-columns: 1fr auto 1fr"] {
      padding: 14px 10px !important;
    }
    header[style*="grid-template-columns: 1fr auto 1fr"] nav {
      gap: 10px !important;
    }
    header[style*="grid-template-columns: 1fr auto 1fr"] nav a {
      font-size: 9px !important;
      letter-spacing: 0.02em !important;
    }
    section[style*="min-height:100vh"],
    section[style*="min-height: 100vh"] {
      padding: 92px 14px 24px !important;
    }
    .mark-wrap {
      width: min(72vw, 56vh) !important;
    }
  }
  /* ===== Normalized header: identical on every page (authoritative — overrides the per-page mobile nav values above) ===== */
  @media (max-width: 760px) {
    header[style*="position: fixed"] { padding: 14px 16px !important; }
    header[style*="position: fixed"] nav { gap: 16px !important; flex-wrap: wrap; justify-content: center !important; }
    header[style*="position: fixed"] nav a,
    header[style*="position: fixed"] nav span { font-size: 9px !important; letter-spacing: 0.05em !important; }
    header[style*="position: fixed"] svg { width: 22px !important; height: 20px !important; }
  }
</style>
